<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Squidly Error</title>
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --bg: #05070d;
      --bg-2: #09111f;
      --card: rgba(10, 20, 35, 0.72);

      --primary: #10CFD5;
      --accent: #03767B;

      --white: #eafbff;
      --muted: #8ca8b8;
      --line: rgba(16, 207, 213, 0.25);
      --glow: 0 0 30px rgba(16, 207, 213, 0.35);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: Inter, sans-serif;
      background:
        radial-gradient(circle at top right, color-mix(in srgb, var(--accent) 28%, transparent), transparent 32%),
        radial-gradient(circle at bottom left, color-mix(in srgb, var(--primary) 22%, transparent), transparent 30%),
        var(--bg);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 24px;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: -1;
    }

    .floating-ring {
      position: absolute;
      border: 1px solid var(--line);
      border-radius: 50%;
      animation: float 10s ease-in-out infinite;
      pointer-events: none;
    }

    .ring-1 {
      width: 420px;
      height: 420px;
      top: -160px;
      right: -120px;
    }

    .ring-2 {
      width: 260px;
      height: 260px;
      bottom: -100px;
      left: -70px;
      animation-delay: -4s;
    }

    .container {
      width: min(900px, 92%);
      padding: 60px;
      border: 1px solid var(--line);
      border-radius: 36px;
      background: var(--card);
      backdrop-filter: blur(18px);
      box-shadow:
        0 20px 70px rgba(0, 0, 0, 0.35),
        var(--glow);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg,
          transparent,
          color-mix(in srgb, var(--primary) 14%, transparent),
          transparent);
      transform: translateX(-100%);
      animation: shine 7s linear infinite;
      pointer-events: none;
    }

    .small-text {
      color: var(--primary);
      letter-spacing: 4px;
      text-transform: uppercase;
      font-size: 0.78rem;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .error-code {
      font-family: Audiowide, sans-serif;
      font-size: clamp(5rem, 18vw, 11rem);
      line-height: 1;
      margin-bottom: 18px;
      background:
        linear-gradient(90deg,
          #ffffff,
          var(--primary),
          var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 30px color-mix(in srgb, var(--primary) 30%, transparent);
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 3rem);
      margin-bottom: 18px;
    }

    p {
      max-width: 620px;
      margin: 0 auto 36px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 1.05rem;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn,
    select {
      padding: 14px 24px;
      border-radius: 999px;
      border: 1px solid var(--line);
      text-decoration: none;
      font-weight: 700;
      transition: 0.25s;
      font-family: Inter, sans-serif;
      font-size: 1rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #021019;
    }

    .btn-secondary,
    select {
      background: color-mix(in srgb, var(--primary) 10%, transparent);
      color: var(--white);
    }

    select {
      cursor: pointer;
      appearance: none;
      text-align: center;
    }

    select option {
      background: #09111f;
      color: white;
    }

    .btn:hover,
    select:hover {
      transform: translateY(-4px);
      box-shadow: var(--glow);
    }

    @keyframes shine {
      to {
        transform: translateX(100%);
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(18px);
      }
    }

    @media (max-width: 700px) {
      .container {
        padding: 40px 24px;
        border-radius: 26px;
      }

      .buttons {
        flex-direction: column;
      }

      .btn,
      select {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <canvas id="stars"></canvas>

  <div class="floating-ring ring-1"></div>
  <div class="floating-ring ring-2"></div>

  <main class="container">
    <div class="small-text" id="smallText">Squidly Network Error</div>

    <div class="error-code" id="errorCode">1408</div>

    <h1 id="title">Wrong Squidly Site</h1>

    <p id="description">
      You appear to have taken a wrong turn through the Squidly network.
    </p>

    <div class="buttons">
      <a href="https://squidly1408.github.io" class="btn btn-primary">
        Go to Squidly1408
      </a>
    </div>
  </main>

  <script>
    /*
    =====================================================
    BRAND TEST BOOLEANS

    Set ONE to true when testing locally.

    When uploaded to GitHub Pages, the site will detect
    the URL automatically.

    Examples:
    - squidly0208.github.io automatically uses 0208
    - squidly2519.github.io automatically uses 2519
    =====================================================
    */

    const IS_SQUIDLY0208 = false;
    const IS_SQUIDLY2519 = false;
    const IS_SQUIDLY0397 = false;

    /*
    =====================================================
    BRAND DATA
    =====================================================
    */

    const squidlySites = {
      squidly0208: {
        hostname: "squidly0208.github.io",
        code: "0208",
        name: "Squidly0208",
        primary: "#1b9aaa",
        accent: "#06d6a0",
        title: "Unknown Murky Waters",
        description:
          "This page does not exist inside the 1408 Universe. The route you followed has drifted into unknown waters."
      },

      squidly2519: {
        hostname: "squidly2519.github.io",
        code: "2519",
        name: "Squidly2519",
        primary: "#c0b8dd",
        accent: "#41ead4",
        title: "Lost in the Lavender",
        description:
          "This page does not exist inside the 1408 Universe. The route you followed has drifted into unknown waters."

      },

      squidly0397: {
        hostname: "squidly0397.github.io",
        code: "0397",
        name: "Squidly0397",
        primary: "#c1b8c8",
        accent: "#499f68",
        title: "The green is not always safe",
        description:
          "This page does not exist inside the 1408 Universe. The route you followed has drifted into unknown waters."
      }
    };

    /*
    =====================================================
    BRAND DETECTION
    =====================================================
    */

    const hostname = window.location.hostname.toLowerCase();

    let site = squidlySites.squidly1408;

    if (hostname.includes("squidly0208.github.io")) {
      site = squidlySites.squidly0208;
    } else if (hostname.includes("squidly2519.github.io")) {
      site = squidlySites.squidly2519;
    } else if (hostname.includes("squidly0397.github.io")) {
      site = squidlySites.squidly0397;
    } else if (IS_SQUIDLY0208) {
      site = squidlySites.squidly0208;
    } else if (IS_SQUIDLY2519) {
      site = squidlySites.squidly2519;
    } else if (IS_SQUIDLY0397) {
      site = squidlySites.squidly0397;
    }

    /*
    =====================================================
    APPLY BRAND
    =====================================================
    */

    document.documentElement.style.setProperty("--primary", site.primary);
    document.documentElement.style.setProperty("--accent", site.accent);
    document.documentElement.style.setProperty("--line", `${site.primary}40`);
    document.documentElement.style.setProperty("--glow", `0 0 30px ${site.primary}66`);

    document.title = `${site.code} — ${site.name}`;

    document.getElementById("errorCode").textContent = site.code;
    document.getElementById("title").textContent = site.title;
    document.getElementById("description").textContent = site.description;
    document.getElementById("smallText").textContent = `${site.name} Network Error`;


    /*
    =====================================================
    STAR BACKGROUND
    =====================================================
    */

    const canvas = document.getElementById("stars");
    const ctx = canvas.getContext("2d");

    let stars = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      createStars();
    }

    function createStars() {
      const amount = Math.floor(
        (canvas.width * canvas.height) / 9000
      );

      stars = Array.from({ length: amount }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.2,
        speed: Math.random() * 0.35 + 0.08,
        alpha: Math.random() * 0.7 + 0.2
      }));
    }

    function hexToRgb(hex) {
      const cleanHex = hex.replace("#", "");

      const bigint = parseInt(cleanHex, 16);

      return {
        r: (bigint >> 16) & 255,
        g: (bigint >> 8) & 255,
        b: bigint & 255
      };
    }

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const rgb = hexToRgb(site.primary);

      for (const star of stars) {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);

        ctx.fillStyle =
          `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${star.alpha})`;

        ctx.fill();

        star.y += star.speed;
        star.x += star.speed * 0.15;

        if (star.y > canvas.height) {
          star.y = -5;
          star.x = Math.random() * canvas.width;
        }
      }

      requestAnimationFrame(drawStars);
    }

    window.addEventListener("resize", resizeCanvas);

    resizeCanvas();
    drawStars();
  </script>

</body>

</html>
